server:
  port: ${PORT:${SERVER_PORT:9091}}
  address: 0.0.0.0
  tomcat:
    max-part-count: 50

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: user-service
  datasource:
    user-service:
      jdbc-url: ${USER_DB_URL:jdbc:mysql://gateway01.us-east-1.prod.aws.tidbcloud.com:4000/user_service?sslMode=REQUIRED}
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        initialization-fail-timeout: 0
    auth-service:
      jdbc-url: ${AUTH_DB_URL:jdbc:mysql://gateway01.us-east-1.prod.aws.tidbcloud.com:4000/auth_service?sslMode=REQUIRED}
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        initialization-fail-timeout: 0
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 20MB
  mail:
    host: ${SMTP_HOST:smtp-relay.brevo.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000
          starttls:
            enable: true
            required: true

security:
  jwt:
    secret-key: ${JWT_SECRET:alht7XYKujQPw1ourB0c4rIRg4x6RNrqewufShlZoug=}
    tokenExpiration: ${JWT_EXPIRATION:1200000}
    refreshTokenExpiration: ${JWT_REFRESH_EXPIRATION:604800000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://my-access-three.vercel.app,https://my-access-ashy.vercel.app,https://my-access-omega.vercel.app,http://localhost:3000,http://localhost:5173}
  brevo:
    api-key: ${BREVO_API_KEY:}
  mail:
    from-email: ${EMAIL_FROM:}
    from-name: ${EMAIL_FROM_NAME:MyAccess}
    # Solo true en desarrollo local; Render bloquea smtp-relay.brevo.com:587
    smtp-enabled: ${MAIL_SMTP_ENABLED:false}
