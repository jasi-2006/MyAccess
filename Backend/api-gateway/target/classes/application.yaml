server:
  port: 8080  # Hardcodeado, sin ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-login
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/login
            - Method=POST

        - id: auth-register
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/register
            - Method=POST

        - id: auth-verify
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/verify
            - Method=POST
        - id: protected-routes
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/**
            - NotPath=/api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/verify
          filters:
            - JwtAuthFilter

security:
