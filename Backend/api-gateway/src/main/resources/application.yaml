server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
              - HEAD
            allowedHeaders: "*"
            exposedHeaders: "*"
            allowCredentials: false
            maxAge: 3600
      routes:
        - id: options-routes
          uri: ${BACKEND_URI:http://localhost:9090}
          order: 0
          predicates:
            - Method=OPTIONS
        - id: uploads-routes
          uri: ${BACKEND_URI:http://localhost:9090}
          order: 1
          predicates:
            - Path=/uploads/**
        - id: auth-routes
          uri: ${BACKEND_URI:http://localhost:9090}
          order: 2
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
        - id: protected-routes
          uri: ${BACKEND_URI:http://localhost:9090}
          order: 3
          predicates:
            - Path=/api/v1/**
          filters:
            - JwtAuthFilter
            - StripPrefix=2

security:
  jwt:
    secret-key: ${JWT_SECRET:alht7XYKujQPw1ourB0c4rIRg4x6RNrqewufShlZoug=}
