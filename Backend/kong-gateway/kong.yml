plugins:
  - name: cors
    config:
      origins:
        - "https://my-access-ashy.vercel.app"
        - "https://my-access-omega.vercel.app"
        - "http://localhost:3000"
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
        - HEAD
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Origin
        - X-Auth-Token
        - X-Requested-With
      exposed_headers:
        - "*"
      credentials: true
      max_age: 3600
      preflight_continue: false

  - name: rate-limiting
    config:
      minute: 100
      policy: local
