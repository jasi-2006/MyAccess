plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
        - HEAD
      headers:
        - "*"
      exposed_headers:
        - "*"
      credentials: false
      max_age: 3600
      preflight_continue: false

  - name: rate-limiting
    config:
      minute: 100
      policy: local

  - name: jwt
    route:
      name: user-register-route
    config: &jwt_config
      key_claim_name: tokenType
      claims_to_verify:
        - exp
      secret_is_base64: true
      run_on_preflight: false
  - name: pre-function
    route:
      name: user-register-route
    config: &claims_headers_config
      access:
        - |
          local authorization = kong.request.get_header("authorization")
          if not authorization then
            return
          end

          local payload = authorization:match("^[Bb]earer%s+[^%.]+%.([^%.]+)%.")
          if not payload then
            return
          end

          local function decode_base64url(value)
            value = value:gsub("-", "+"):gsub("_", "/")
            local remainder = #value % 4
            if remainder == 2 then
              value = value .. "=="
            elseif remainder == 3 then
              value = value .. "="
            elseif remainder ~= 0 then
              return nil
            end
            return ngx.decode_base64(value)
          end

          local decoded = decode_base64url(payload)
          if not decoded then
            return
          end

          local cjson = require "cjson.safe"
          local claims = cjson.decode(decoded)
          if type(claims) ~= "table" then
            return
          end

          kong.service.request.clear_header("x-User-id")
          kong.service.request.clear_header("X-User-Email")
          kong.service.request.clear_header("X-User-role")

          if claims.userId ~= nil then
            kong.service.request.set_header("x-User-id", tostring(claims.userId))
          end
          if claims.emailId ~= nil then
            kong.service.request.set_header("X-User-Email", tostring(claims.emailId))
          end
          if claims.role ~= nil then
            kong.service.request.set_header("X-User-role", tostring(claims.role))
          end

  - name: jwt
    route:
      name: auth-service-route
    config: *jwt_config
  - name: pre-function
    route:
      name: auth-service-route
    config: *claims_headers_config

  - name: jwt
    route:
      name: role-route
    config: *jwt_config
  - name: pre-function
    route:
      name: role-route
    config: *claims_headers_config

  - name: jwt
    route:
      name: register-audit-route
    config: *jwt_config
  - name: pre-function
    route:
      name: register-audit-route
    config: *claims_headers_config

  - name: jwt
    route:
      name: register-permissions-route
    config: *jwt_config
  - name: pre-function
    route:
      name: register-permissions-route
    config: *claims_headers_config

  - name: jwt
    route:
      name: card-route
    config: *jwt_config
  - name: pre-function
    route:
      name: card-route
    config: *claims_headers_config

  - name: jwt
    route:
      name: news-route
    config: *jwt_config
  - name: pre-function
    route:
      name: news-route
    config: *claims_headers_config

  - name: jwt
    route:
      name: notifications-route
    config: *jwt_config
  - name: pre-function
    route:
      name: notifications-route
    config: *claims_headers_config
