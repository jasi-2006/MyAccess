_format_version: "3.0"
_transform: true

consumers:
  - username: myaccess-jwt
    jwt_secrets:
      - key: access
        algorithm: HS256
        secret: "{vault://env/jwt-secret}"

services:
  - name: user-auth-service
    url: https://myaccess-user.onrender.com/auth
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: auth-public-route
        protocols:
          - http
          - https
        paths:
          - /api/v1/auth
        strip_path: true
        path_handling: v0

  - name: user-uploads-service
    url: https://myaccess-user.onrender.com
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: uploads-route
        protocols:
          - http
          - https
        paths:
          - /uploads
        strip_path: false
        path_handling: v0

  - name: user-register-service
    url: https://myaccess-user.onrender.com/register
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: user-register-route
        protocols:
          - http
          - https
        paths:
          - /api/v1/register
        strip_path: true
        path_handling: v0
        plugins:
          - name: jwt
            config: &jwt_config
              key_claim_name: tokenType
              claims_to_verify:
                - exp
              secret_is_base64: true
              run_on_preflight: false
          - name: pre-function
            config: &claims_headers_config
              access:
                - |
                  local authorization = kong.request.get_header("authorization")
                  if not authorization then
                    return
                  end

                  local payload = authorization:match("^[Bb]earer%s+[^%.]+%.([^%.]+)%.")
                  if not payload then
                    return
                  end

                  local function decode_base64url(value)
                    value = value:gsub("-", "+"):gsub("_", "/")
                    local remainder = #value % 4
                    if remainder == 2 then
                      value = value .. "=="
                    elseif remainder == 3 then
                      value = value .. "="
                    elseif remainder ~= 0 then
                      return nil
                    end
                    return ngx.decode_base64(value)
                  end

                  local decoded = decode_base64url(payload)
                  if not decoded then
                    return
                  end

                  local cjson = require "cjson.safe"
                  local claims = cjson.decode(decoded)
                  if type(claims) ~= "table" then
                    return
                  end

                  kong.service.request.clear_header("x-User-id")
                  kong.service.request.clear_header("X-User-Email")
                  kong.service.request.clear_header("X-User-role")

                  if claims.userId ~= nil then
                    kong.service.request.set_header("x-User-id", tostring(claims.userId))
                  end
                  if claims.emailId ~= nil then
                    kong.service.request.set_header("X-User-Email", tostring(claims.emailId))
                  end
                  if claims.role ~= nil then
                    kong.service.request.set_header("X-User-role", tostring(claims.role))
                  end

  - name: auth-users-service
    url: https://myaccess-1.onrender.com/authService
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: auth-service-route
        protocols:
          - http
