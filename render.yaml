# MyAccess — Render Blueprint Configuration
# 
# Tras el deploy, las URLs públicas del Gateway y del Frontend quedan así:
#   Gateway (Kong): https://myaccess-kong.onrender.com (o similar)
#   Cada servicio tiene un puerto interno y comunicación interna privada segura en Render.
#
# En el Dashboard de Render, debes configurar en el grupo de variables compartidas (myaccess-shared):
#   DB_HOST          -> Tu host de TiDB Cloud o MySQL
#   DB_PORT          -> Tu puerto de TiDB Cloud (ej. 4000)
#   DB_USERNAME      -> Tu usuario de base de datos
#   DB_PASSWORD      -> Tu contraseña de base de datos
#   JWT_SECRET       -> Tu secreto JWT (base64 de 256 bits)
#
# Para cada servicio, Render te pedirá las variables específicas "sync: false" no compartidas.

envVarGroups:
  - name: myaccess-shared
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "4000"
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://my-access-three.vercel.app,https://my-access-ashy.vercel.app,https://my-access-omega.vercel.app,http://localhost:3000,http://localhost:5173

services:

  - type: web
    name: myaccess-user
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Backend/user-service/Dockerfile
    dockerContext: ./Backend/user-service
    envVars:
      - fromGroup: myaccess-shared
      - key: PORT
        value: 10000
      - key: USER_DB_URL
        sync: false
      - key: AUTH_DB_URL
        sync: false
      - key: JWT_EXPIRATION
        value: 1200000
      - key: JWT_REFRESH_EXPIRATION
        value: 604800000
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: MyAccess

  - type: web
    name: myaccess-auth
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Backend/auth-service/Dockerfile
    dockerContext: ./Backend/auth-service
    envVars:
      - fromGroup: myaccess-shared
      - key: PORT
        value: 10000
      - key: AUTH_DB_URL
        sync: false
      - key: JWT_EXPIRATION
        value: 1200000

  - type: web
    name: myaccess-card
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Backend/card-service/Dockerfile
    dockerContext: ./Backend/card-service
    envVars:
      - fromGroup: myaccess-shared
      - key: PORT
        value: 10000
      - key: CARD_DB_URL
        sync: false

  - type: web
    name: myaccess-news
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Backend/news-service/Dockerfile
    dockerContext: ./Backend/news-service
    envVars:
      - fromGroup: myaccess-shared
      - key: PORT
        value: 10000
      - key: NEWS_DB_URL
        sync: false

  - type: web
    name: myaccess-notification
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Backend/notifications-service/Dockerfile
    dockerContext: ./Backend/notifications-service
    envVars:
      - fromGroup: myaccess-shared
      - key: PORT
        value: 10000
      - key: NOTIFICATIONS_DB_URL
        sync: false

  - type: web
    name: myaccess-validation
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Backend/validation-service/Dockerfile
    dockerContext: ./Backend/validation-service
    envVars:
      - fromGroup: myaccess-shared
      - key: PORT
        value: 5005
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: myaccess-kong
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Backend/kong-gateway/Dockerfile
    dockerContext: ./Backend/kong-gateway
    envVars:
      - fromGroup: myaccess-shared
      - key: KONG_PROXY_LISTEN
        value: 0.0.0.0:10000
      - key: KONG_STATUS_LISTEN
        value: "off"
      - key: KONG_NGINX_WORKER_PROCESSES
        value: "1"
      - key: KONG_NGINX_WORKER_CONNECTIONS
        value: "512"
      - key: KONG_MEM_CACHE_SIZE
        value: 32m
      - key: KONG_LOG_LEVEL
        value: notice
      - key: KONG_ANONYMOUS_REPORTS
        value: "off"
      - key: USER_SERVICE_URL
        value: http://myaccess-user:10000
      - key: AUTH_SERVICE_URL
        value: http://myaccess-auth:10000
      - key: CARD_SERVICE_URL
        value: http://myaccess-card:10000
      - key: NEWS_SERVICE_URL
        value: http://myaccess-news:10000
      - key: NOTIFICATIONS_SERVICE_URL
        value: http://myaccess-notification:10000
      - key: VALIDATION_SERVICE_URL
        value: http://myaccess-validation:5005
