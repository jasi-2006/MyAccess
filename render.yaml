services:

  - type: web
    name: myaccess-user-service
    runtime: docker
    dockerfilePath: ./Backend/user-service/Dockerfile
    dockerContext: ./Backend/user-service
    envVars:
      - key: PORT
        value: 10000
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 1200000
      - key: JWT_REFRESH_EXPIRATION
        value: 1200000
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  - type: web
    name: myaccess-card-service
    runtime: docker
    dockerfilePath: ./Backend/card-service/Dockerfile
    dockerContext: ./Backend/card-service
    envVars:
      - key: PORT
        value: 10000
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: myaccess-news-service
    runtime: docker
    dockerfilePath: ./Backend/news-service/Dockerfile
    dockerContext: ./Backend/news-service
    envVars:
      - key: PORT
        value: 10000
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: myaccess-notifications-service
    runtime: docker
    dockerfilePath: ./Backend/notifications-service/Dockerfile
    dockerContext: ./Backend/notifications-service
    envVars:
      - key: PORT
        value: 10000
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: myaccess-gateway
    runtime: docker
    dockerfilePath: ./Backend/kong-gateway/Dockerfile
    dockerContext: ./Backend/kong-gateway
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: KONG_PROXY_LISTEN
        value: 0.0.0.0:10000
      - key: KONG_STATUS_LISTEN
        value: "off"
      - key: KONG_NGINX_WORKER_PROCESSES
        value: "1"
      - key: KONG_NGINX_WORKER_CONNECTIONS
        value: "512"
      - key: KONG_MEM_CACHE_SIZE
        value: 32m
      - key: KONG_LOG_LEVEL
        value: notice
      - key: KONG_ANONYMOUS_REPORTS
        value: "off"
